services: 
  app: 
    image: amirzeb001/basic-app:v1.0.3
    # ports: 
    #   -  "3001:3001" 
    env_file: 
      - .env.local

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app